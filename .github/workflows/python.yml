name: python

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install
        run: pip install -e ".[dev]"
      - name: lint
        run: ruff check .
      - name: format-check
        run: ruff format --check .
      - name: test
        run: pytest -q
